name: PR

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true
  RUST_TOOLCHAIN: 1.79.0
  NDK_VERSION: 27.0.12077973

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Lint check
        run: ./gradlew lintDebug --no-daemon

  unit-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr
          path: app/build/reports/tests/

  build:
    runs-on: ubuntu-22.04
    needs: [lint, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elysium-vanguard-pr
          path: app/build/outputs/apk/debug/app-debug.apk

  api-compatibility:
    runs-on: ubuntu-22.04
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Check API compatibility
        run: ./gradlew app:checkDebugApiCompatibility --no-daemon || echo "API check skipped"

  summary:
    runs-on: ubuntu-22.04
    needs: [build, api-compatibility]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: PR summary
        run: |
          echo "## PR Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: ${{ needs.unit-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
